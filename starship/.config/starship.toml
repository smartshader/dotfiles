"$schema" = 'https://starship.rs/config-schema.json'

add_newline = true

format = """
$directory\
$git_branch\
$git_status\
$character"""

[directory]
truncation_length = 3
truncate_to_repo = false

[git_branch]
symbol = " "

[git_status]
style = "bold red"

[character]
success_symbol = "[➜](bold green)"
error_symbol = "[❯](bold red)"
